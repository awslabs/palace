name: Spack

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  packages: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_USER: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Filter to allow skipping the test if no relevant changes occurred.
  filter:
    runs-on: ubuntu-latest
    outputs:
      test: ${{ steps.filter.outputs.test }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            test:
              - 'palace/**'
              - 'cmake/**'
              - 'extern/**'
              - 'examples/**'
              - 'test/examples/**'
              - 'test/unit/**'
              - 'spack_repo/**'
              - '.github/actions/**'
              - '.github/workflows/spack.yml'

  # Build jobs
  build-x64-gcc:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/palace-ci
        with:
          toolchain: gcc
          run-regression-tests: 'false'
      - name: Install Docker
        shell: bash
        run: |
          sudo apt-get install -y docker.io
          sudo systemctl start docker
      - name: Generate Dockerfile
        shell: bash
        run: |
          spack -e . containerize > Dockerfile
          # Replace /opt/palace with actual workspace path so container matches host
          sed -i "s|/opt/palace|$PWD|g" Dockerfile
          # Inject build args for GHCR mirror authentication
          sed -i '/^FROM bootstrap AS builder/a ARG GITHUB_USER\nARG GITHUB_TOKEN\nENV GITHUB_USER=$GITHUB_USER\nENV GITHUB_TOKEN=$GITHUB_TOKEN' Dockerfile
          # To match the host Palace identically, we also need to build tests
          sed -i 's/spack install --fail-fast/spack install --fail-fast --test root/' Dockerfile
      - name: Build Docker image
        shell: bash
        run: |
          sudo docker build \
            --build-arg GITHUB_USER=$GITHUB_USER \
            --build-arg GITHUB_TOKEN=$GITHUB_TOKEN \
            -t palace-x86_64_v4 .
      - name: Save Docker image as tar
        shell: bash
        run: |
          sudo docker save palace-x86_64_v4:latest -o palace-x86_64_v4.tar
      - name: Upload container
        uses: actions/upload-artifact@v4
        with:
          name: palace-x86_64_v4
          path: palace-x86_64_v4.tar
          retention-days: 3
