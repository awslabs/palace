name: Spack

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  packages: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Note that each spack version needs its own registry
  SPACK_VERSION: develop
  REGISTRY: ghcr.io/awslabs/palace
  GITHUB_USER: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Filter to allow skipping the test if no relevant changes occurred.
  filter:
    runs-on: ubuntu-latest
    outputs:
      test: ${{ steps.filter.outputs.test }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            test:
              - 'palace/**'
              - 'cmake/**'
              - 'extern/**'
              - 'examples/**'
              - 'test/examples/**'
              - 'test/unit/**'
              - '.github/workflows/spack.yml'

  # Build jobs
  build-x64-gcc:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: gcc

  build-x64-llvm:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: llvm

  build-x64-intel:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: intel-oneapi

  build-gpu-gcc:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: gcc
          variant: +cuda

  build-arm64-gcc:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: gcc

  build-arm64-llvm:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: llvm

  build-arm64-gcc-armpl:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: gcc
          math-libs: armpl-gcc

  build-x64-gcc-openmp:
    needs: filter
    if: needs.filter.outputs.test == 'true'
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-palace
        with:
          toolchain: gcc
          variant: "+openmp+int64~shared"

  # Test jobs
  test-x64-gcc:
    needs: [filter, build-x64-gcc]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: gcc
          solver: ${{ matrix.solver }}

  test-x64-llvm:
    needs: [filter, build-x64-llvm]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: llvm
          solver: ${{ matrix.solver }}

  test-x64-intel:
    needs: [filter, build-x64-intel]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: intel-oneapi
          solver: ${{ matrix.solver }}

  test-gpu-gcc:
    needs: [filter, build-gpu-gcc]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: gcc
          variant: +cuda
          solver: ${{ matrix.solver }}

  test-arm64-gcc:
    needs: [filter, build-arm64-gcc]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: gcc
          solver: ${{ matrix.solver }}

  test-arm64-llvm:
    needs: [filter, build-arm64-llvm]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: llvm
          solver: ${{ matrix.solver }}

  test-arm64-gcc-armpl:
    needs: [filter, build-arm64-gcc-armpl]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: gcc
          math-libs: armpl-gcc
          solver: ${{ matrix.solver }}

  test-x64-gcc-openmp:
    needs: [filter, build-x64-gcc-openmp]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        solver: [MUMPS, SuperLU, STRUMPACK, Default]
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-palace
        with:
          toolchain: gcc
          variant: "+openmp+int64~shared"
          solver: ${{ matrix.solver }}
