name: gh-pages Cleanup

permissions:
  contents: write

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3 AM UTC

jobs:
  cleanup-pr-previews:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Delete preview and history
        env:
          PRNUM: ${{ github.event.number }}
        run: |
          if [[ -d previews/PR$PRNUM ]]; then
            git config user.name "Documenter.jl"
            git config user.email "documenter@juliadocs.github.io"
            git rm -rf previews/PR$PRNUM
            git commit -m "delete preview"
            git branch gh-pages-new $(echo "delete history" | git commit-tree HEAD^{tree})
            git push --force origin gh-pages-new:gh-pages
          fi

  cleanup-old-coverage:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove coverage reports older than 30 days
        run: |
          if [[ ! -d coverage ]]; then
            echo "No coverage directory found"
            exit 0
          fi

          DELETED=0
          CUTOFF=$(date -d '30 days ago' +%s 2>/dev/null || date -v-30d +%s)

          for dir in coverage/*/; do
            [[ -d "$dir" ]] || continue
            # Use the git commit date of when the directory was added
            COMMIT_DATE=$(git log -1 --format=%ct -- "$dir" 2>/dev/null || echo "0")
            if [[ "$COMMIT_DATE" -lt "$CUTOFF" ]]; then
              git rm -rf "$dir"
              DELETED=$((DELETED + 1))
            fi
          done

          if [[ "$DELETED" -gt 0 ]]; then
            git config user.name "Documenter.jl"
            git config user.email "documenter@juliadocs.github.io"
            git commit -m "clean up $DELETED old coverage report(s)"
            git branch gh-pages-new $(echo "delete history" | git commit-tree HEAD^{tree})
            git push --force origin gh-pages-new:gh-pages
          else
            echo "No old coverage reports to clean up"
          fi
