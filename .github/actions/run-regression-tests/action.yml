# This action should be run in/after the palace-ci action.

name: 'Test Palace'
description: 'Run Palace integration tests'
inputs:
  testing-on-build-runner:
    description: 'Set to true if the tests are being run on the machine that built the software (avoids setups)'
    required: false
    default: 'false'
  toolchain:
    description: 'Toolchain to use'
    required: true
  variant:
    description: 'Palace variant'
    required: false
    default: ''
  math-libs:
    description: 'Math libraries'
    required: false
    default: ''
  linear-solver:
    description: 'Linear solver to test'
    required: false
    default: 'Default'
  test-cases:
    description: 'Test cases: "default", "long", or space-separated list'
    required: false
    default: 'default'
  additional-test-cases:
    description: 'Additional test cases to run after test-cases (space-separated list)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      if: inputs.testing-on-build-runner != 'true'
      uses: ./.github/actions/setup-runner
      with:
        spack-version: 'develop'
        llvm-version: ${{ inputs.toolchain == 'llvm' && '19' || 'dont-install' }}
        setup-intel: ${{ inputs.toolchain == 'intel-oneapi' && 'true' || 'false' }}

    # The palace-ci action uploads the spack lock and yaml files. Here, we
    # download them. This ensures we can download the same binaries we built in
    # the previous step.
    - name: Download spack environment
      if: inputs.testing-on-build-runner != 'true'
      uses: actions/download-artifact@v8
      with:
        name: spack-env-${{ runner.arch }}-${{ inputs.toolchain }}-${{ inputs.variant || 'default' }}-${{ inputs.math-libs || 'default' }}

    - name: Install from cache
      if: inputs.testing-on-build-runner != 'true'
      shell: bash
      run: |
        source /tmp/timing_functions.sh
        start_timer
        # --test root builds and installs the palace-unit-tests binary
        # (and its test data). The target is EXCLUDE_FROM_ALL, so
        # without --test root the regression harness binary is never
        # built and `spack load palace` can't expose it. The lock was
        # already concretized with --test root by the build job, so the
        # test deps (catch2) are present in the concrete environment.
        spack -e . install --only-concrete --no-check-signature --test root
        end_timer "Install from cache"

    - name: Run Integration Tests
      shell: bash
      run: |
        source /tmp/timing_functions.sh
        start_timer

        eval $(spack -e . load --sh palace)

        # The installed package ships a relocatable, fully generic
        # CTestTestfile next to the test data (share/palace/test), so the
        # install-only runner drives the regression cases with ctest -- per-case
        # scheduling and PROCESSORS accounting, same as the build-tree jobs. The
        # ranks/threads/solver/device are all passed through the environment, so
        # one cached build serves the whole solver matrix without a rebuild.
        TEST_DIR="$(dirname "$(dirname "$(command -v palace-unit-tests)")")/share/palace/test"
        export PALACE_TEST_LINEAR_SOLVER="${{ inputs.linear-solver }}"

        # Keep ~8 CPUs per case (ranks x threads); OpenMP jobs trade ranks for
        # threads. Fewer ranks shift tail eigenvalues past tolerance.
        TEST_CORES=$(nproc)
        if [[ "$TEST_CORES" -gt 8 ]]; then
          TEST_CORES=8
        fi
        if [[ "${{ inputs.variant }}" == *"+openmp"* ]]; then
          export PALACE_TEST_OMP_THREADS=2
        else
          export PALACE_TEST_OMP_THREADS=1
        fi
        export PALACE_TEST_NUMPROC=$(( TEST_CORES / PALACE_TEST_OMP_THREADS ))
        JOBS="$(nproc)"
        if [[ "${{ inputs.variant }}" == *"+cuda"* ]]; then
          export PALACE_TEST_DEVICE=cuda
          export PALACE_TEST_NUMPROC=1  # GPU: single rank
          JOBS=1                        # one GPU: don't run device cases concurrently
        fi

        run_ctest() {
          ctest --test-dir "$TEST_DIR" --output-on-failure -j "$JOBS" "$@"
        }

        # Map the action's `test-cases` input onto a ctest selection. "default"
        # is the always-on regression label; "long" the heavy [Long] cases;
        # anything else is a space-separated list of explicit case names.
        run_cases() {
          local raw="$1"
          if [[ -z "$raw" || "$raw" == "default" ]]; then
            run_ctest -L "^regression$"
          elif [[ "$raw" == "long" ]]; then
            run_ctest -L "^long$"
          else
            local regex
            regex="$(echo "$raw" | tr ' ' '|')"
            run_ctest -R "^(regression|long)-(${regex})$"
          fi
        }

        run_cases "${{ inputs.test-cases }}"

        ADDITIONAL="${{ inputs.additional-test-cases }}"
        if [[ -n "$ADDITIONAL" ]]; then
          run_cases "$ADDITIONAL"
        fi

        end_timer "Run Integration Tests"

    - name: Timing information
      shell: bash
      run: |
        cat /tmp/timing.log

