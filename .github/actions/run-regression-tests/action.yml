# This action should be run in/after the palace-ci action.

name: 'Test Palace'
description: 'Run Palace integration tests'
inputs:
  testing-on-build-runner:
    description: 'Set to true if the tests are being run on the machine that built the software (avoids setups)'
    required: false
    default: 'false'
  toolchain:
    description: 'Toolchain to use'
    required: true
  variant:
    description: 'Palace variant'
    required: false
    default: ''
  math-libs:
    description: 'Math libraries'
    required: false
    default: ''
  solver:
    description: 'Solver to test'
    required: false
    default: 'Default'
  test-cases:
    description: 'Test cases: "default", "long", or space-separated list'
    required: false
    default: 'default'
  additional-test-cases:
    description: 'Additional test cases to run after test-cases (space-separated list)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      if: inputs.testing-on-build-runner != 'true'
      uses: ./.github/actions/setup-runner
      with:
        julia-version: 'dont-install'
        spack-version: 'develop'
        llvm-version: ${{ inputs.toolchain == 'llvm' && '19' || 'dont-install' }}
        setup-intel: ${{ inputs.toolchain == 'intel-oneapi' && 'true' || 'false' }}

    # The palace-ci action uploads the spack lock and yaml files. Here, we
    # download them. This ensures we can download the same binaries we built in
    # the previous step.
    - name: Download spack environment
      if: inputs.testing-on-build-runner != 'true'
      uses: actions/download-artifact@v8
      with:
        name: spack-env-${{ runner.arch }}-${{ inputs.toolchain }}-${{ inputs.variant || 'default' }}-${{ inputs.math-libs || 'default' }}

    - name: Install from cache
      if: inputs.testing-on-build-runner != 'true'
      shell: bash
      run: |
        source /tmp/timing_functions.sh
        start_timer
        spack -e . install --only-concrete --no-check-signature
        end_timer "Install from cache"

    - name: Run Integration Tests
      shell: bash
      run: |
        source /tmp/timing_functions.sh
        start_timer
        # Use nproc, but halve to account for hyperthreading.
        LOGICAL_CORES=$(nproc)
        THREADS_PER_CORE=$(lscpu | grep "Thread(s) per core" | awk '{print $4}')
        if [ "$THREADS_PER_CORE" = "2" ]; then
            export NUM_PROC_TEST=$((LOGICAL_CORES / 2))
        else
            export NUM_PROC_TEST=$LOGICAL_CORES
        fi

        if [[ "${{ inputs.variant }}" == *"+openmp"* ]]; then
          NUM_PROC_TEST=$(( NUM_PROC_TEST / 2 ))
          export OMP_NUM_THREADS=2
        else
          export OMP_NUM_THREADS=1
        fi

        eval $(spack -e . load --sh palace)

        # Catch2 CLI knobs match the old Julia harness flags one-for-one;
        # palace-unit-tests --help lists them in full.
        SOLVER_OVERRIDE=()
        if [[ -n "${{ inputs.solver }}" && "${{ inputs.solver }}" != "Default" ]]; then
          SOLVER_OVERRIDE=(--palace-solver "${{ inputs.solver }}")
        fi

        if [[ "${{ inputs.variant }}" == *"+cuda"* ]]; then
          SOLVER_OVERRIDE+=(--palace-device GPU)
          export NUM_PROC_TEST=1
        fi

        # Translate the action's `test-cases` input to a list of Catch2
        # case names. "default" / empty -> the [Regression] tag (the
        # always-on suite, enumerated dynamically); "long" -> the
        # [Long] tag (transmon eigenmodes, ~10 min each); anything else
        # is taken as a space-separated list of Catch2 TEST_CASE names
        # (e.g. "transmon_coarse cylinder_cavity_pec"), passed through
        # verbatim.
        translate_cases() {
          local raw="$1"
          if [[ -z "$raw" || "$raw" == "default" ]]; then
            palace-unit-tests "[Regression]~[Long]" --list-tests | awk '/^  [a-z]/ {print $1}'
            return
          fi
          if [[ "$raw" == "long" ]]; then
            palace-unit-tests "[Long]" --list-tests | awk '/^  [a-z]/ {print $1}'
            return
          fi
          echo "$raw" | tr ' ' '\n'
        }

        # One mpirun per case. Each case runs in a fresh process so
        # long-lived library state (libCEED kernel cache, MFEM /
        # HYPRE singletons, PETSc heap) doesn't accumulate across the
        # whole suite.
        run_cases() {
          while IFS= read -r case; do
            [[ -z "$case" ]] && continue
            echo "=== Running $case ==="
            mpirun -np $NUM_PROC_TEST palace-unit-tests \
              "${SOLVER_OVERRIDE[@]}" \
              "$case"
          done
        }

        translate_cases "${{ inputs.test-cases }}" | run_cases

        ADDITIONAL="${{ inputs.additional-test-cases }}"
        if [[ -n "$ADDITIONAL" ]]; then
          translate_cases "$ADDITIONAL" | run_cases
        fi

        end_timer "Run Integration Tests"

    - name: Timing information
      shell: bash
      run: |
        cat /tmp/timing.log

